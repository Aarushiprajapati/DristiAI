services:
  - type: web
    name: dristiai
    runtime: static
    branch: master
    buildCommand: npm ci && npx expo export --platform web --output-dir dist
    staticPublishPath: ./dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
